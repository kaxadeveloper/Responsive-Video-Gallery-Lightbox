<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Video Gallery Lightbox</title>
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section>
        <div class="container">
            <div class="main-video">
                <video src="videos/video1.mp4" controls muted autoplay></video>
                <i class="bx bx-x close"></i>
            </div>
            <div class="videos">
                <video src="videos/video1.mp4"></video>
                <i class="bx bx-play-circle"></i>
            </div>
            <div class="videos">
                <video src="videos/video2.mp4"></video>
                <i class="bx bx-play-circle"></i>
            </div>
            <div class="videos">
                <video src="videos/video3.mp4"></video>
                <i class="bx bx-play-circle"></i>
            </div>
            <div class="videos">
                <video src="videos/video4.mp4"></video>
                <i class="bx bx-play-circle"></i>
            </div>
        </div>
    </section>

    <script src="app.js"></script>
</body>

</html>
